  <!--
    F1 — pre-paint theme bootstrap. Reads the persisted theme mode from
    localStorage (Zustand key `mangatime-theme-storage`) and stamps
    `class="dark"` / `data-theme-mode="..."` onto <html> BEFORE the
    browser paints. Eliminates the html.dark CLS=1.000 PageSpeed
    flagged on 2026-05-20 — the React ThemeInjector used to add this
    class AFTER hydration, so the document had a class swap visible
    in the layout-shift budget.

    The block is intentionally synchronous + small + try/catched so it
    cannot delay or break the page if localStorage is unavailable
    (private-mode Firefox, sandboxed iframes, server-side render).
  -->
  <script>
    (function () {
      try {
        var root = document.documentElement;
        var mode = 'dark'; // matches themeStore default
        var raw = window.localStorage && localStorage.getItem('mangatime-theme-storage');
        if (raw) {
          var parsed = JSON.parse(raw);
          var stored = parsed && parsed.state && parsed.state.mode;
          if (stored === 'light' || stored === 'dark') mode = stored;
        }
        root.setAttribute('data-theme-mode', mode);
        if (mode === 'dark') root.classList.add('dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme-mode', 'dark');
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

<body>
  <div id="root">
    <!-- Boot screen — replaced by React on mount (see #mt-boot CSS above). -->
    <div id="mt-boot" aria-hidden="true">
      <span class="mt-boot-bar"></span>
      <img class="mt-boot-logo" src="/images/logo-64.png" alt="" width="64" height="64" decoding="async" />

  <!-- Prefetch hot-path data in parallel with JS bundle download.
       Each entry hands the bundle a Promise it can read synchronously on
       first render, eliminating the post-mount re-fetch round-trip and
       the layout shifts those round-trips would otherwise cause:
         • homepage      — drives the section grid (was always prefetched).
         • announcements — P2.3. Banner state known from first paint.
         • cardOverrides — P2.5. ResolverProvider gets the live overrides
           synchronously; cards resolve to their final variant on first
           paint instead of swapping ~100ms in (variant swap = potentially
           different card height = CLS).
         • cardCustoms   — P2.5. Same story for admin-authored custom
           variants: the runtime CardRegistry hydrates before the first
           card resolves.
       All four endpoints are publicProcedure / no-auth — safe to fire
       from a pre-bundle script with no Authorization header. -->
  <script>
    (function() {
      try {
        window.__PREFETCH__ = window.__PREFETCH__ || {};
        var onHome = location.pathname === '/';

        // Capacitor APK: the WebView origin is https://localhost (the local
        // bundle server), so a RELATIVE '/trpc/...' resolves against
        // localhost and fails instantly — the prefetch silently never
        // worked in-app and the homepage waited for full React boot before
        // its first network request. The bundle is local in the APK (zero
        // download time), so starting the data fetch at HTML-parse time is
        // worth even more there than on web. The Capacitor bridge script is
        // injected at document start, so window.Capacitor is available
        // here; the origin check is a belt-and-braces fallback.
        var isNative = false;
        try {
          isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())
            || location.origin === 'https://localhost'
            || location.protocol === 'capacitor:';
        } catch (ne) {}

        // In-app, <img> resources load over the WebView network stack —
        // warm the DNS+TLS connection to the image host before the first
        // cover request. (API fetches go through the native CapacitorHttp
        // bridge, which preconnect can't help; the prefetch fetch below is
        // itself the warm-up for that path.) Skipped on web: same-origin,
        // and PageSpeed flags unused preconnects.
        if (isNative) {
          var pc = document.createElement('link');
          pc.rel = 'preconnect';
          pc.href = 'https://mangatime.org';
          document.head.appendChild(pc);
        }

        // cardOverrides + cardCustoms are needed on every route (they drive
        // the CardRegistry to avoid CLS). homepage + announcements only on '/'
        // — expensive aggregate should not run on deep-link/SEO routes that
        // never consume it. (WEB2/WEB3: batch 4→2 procs on non-home routes)
        var procs = ['cards.getOverrides', 'cards.customs.getPublishedCustoms'];
        if (onHome) procs = ['homepage.getHomepage', 'homepage.getAnnouncements'].concat(procs);

        var input = {};
        procs.forEach(function(_, i) { input[i] = {}; });

        // Native must use the absolute API origin (mirrors getApiBaseUrl()
        // in src/lib/config.ts — keep the two in sync). Web stays relative
        // ('/trpc' is routed by host nginx; same-origin, no extra DNS).
        var apiBase = isNative ? 'https://mangatime.org/api' : '';
        var url = apiBase + '/trpc/' + procs.join(',') + '?batch=1&input=' + encodeURIComponent(JSON.stringify(input));
        var batched = fetch(url).then(function(r) { return r.json(); }).catch(function() { return null; });

        // Re-expose each procedure's slice under its existing __PREFETCH__ key
        // so consumers are unchanged. A batched response is an array indexed
        // like `procs`; wrap each element as [arr[i]] to match the shape the
        // previous single-call go() returned: [{result:{data:...}}].
        // Each consumer does arr[0].result.data.xxx — this preserves that path.
        //
        // Each key ALSO lands on window.__PREFETCH_SETTLED__ in the microtask it
        // resolves, so a useState initializer can consume it SYNCHRONOUSLY when
        // the network beat React boot (common on web — the fetch starts at
        // HTML-parse time). The settled mirror stores the resolved value
        // ([arr[i]] on success, null on a failed batch — `batched` already
        // catches to null).
        //
        // DRAINING CONTRACT: any consumer that reads a __PREFETCH_SETTLED__ key
        // MUST delete BOTH window.__PREFETCH__[key] and
        // window.__PREFETCH_SETTLED__[key] on consumption, or back-navigation to
        // '/' replays stale session-start data. `announcements` is consumed
        // (settled sync-read) and drained by AnnouncementsBanner; `homepage` is
        // consumed via the __PREFETCH__ promise by usePrefetchedHomepage
        // (HomePage.tsx) which drains BOTH keys on consumption — the settled
        // mirror copy must never outlive the promise copy, even though nothing
        // sync-reads it yet; `cardOverrides`/`cardCustoms` remain write-only
        // (inert) until their consumers adopt the pattern, at which point they
        // too must drain both keys.
        //
        // Any post-boot reader that needs the homepage payload (e.g. the hero LCP
        // preload) must attach to the `batched`/slice PROMISE in this script
        // (drain-immune: drains delete window properties, not promise callbacks)
        // or consume it inside usePrefetchedHomepage's onPayload — it must NOT
        // read __PREFETCH_SETTLED__.homepage, which is drained on consumption and
        // pinned against sync-reads by HomePage.seed.test.tsx.
        procs.forEach(function(name, i) {
          var key = name === 'homepage.getHomepage'              ? 'homepage'
                  : name === 'homepage.getAnnouncements'         ? 'announcements'
                  : name === 'cards.getOverrides'                ? 'cardOverrides'
                  : 'cardCustoms';
          var slice = batched.then(function(arr) {
            return arr ? [arr[i]] : null;
          });
          slice.then(function(v) {
            (window.__PREFETCH_SETTLED__ = window.__PREFETCH_SETTLED__ || {})[key] = v;
          });
          window.__PREFETCH__[key] = slice;
        });

        // ── LCP: above-the-fold AD-banner image preload (homepage only) ──
        // The homepage's LCP element on both mobile and desktop is the
        // app-download banner ad rendered into the `hero-overlay` surface
        // (an <img> via AnimatedBanner). Its URL is NOT in the homepage
        // batch above — it lives behind `homepage.ads.getActivePlacements`,
        // a separate query that previously only fired AFTER React booted, so
        // the browser discovered the LCP image very late (requestDiscoverable
        // = NO in the 2026-06-11 baseline). We fire that query here at
        // HTML-parse time (in parallel with the bundle download) and, the
        // moment it resolves, inject a real <link rel=preload as=image
        // fetchpriority=high> for the first hero/hero-overlay image ad. The
        // banner <img> already renders eager + fetchpriority=high (see
        // AnimatedBanner / BannerVariant), so the preloaded bytes are reused
        // when React paints it — no double fetch.
        //
        // getActivePlacements is a publicProcedure (no auth) → safe to fetch
        // from this pre-bundle script with no Authorization header. We do NOT
        // seed React Query from this; the ad hosts keep their own useQuery
        // (the placement JSON is tiny). This fetch exists to (a) warm that
        // response and (b) surface the LCP image URL early enough to preload.
        if (onHome) {
          try {
            // Mirror the batch call shape used above for no-input procs:
            // input is a plain `{}` per index (NOT superjson-wrapped on the
            // request — matches the working homepage/announcements batch).
            var adsUrl = apiBase + '/trpc/homepage.ads.getActivePlacements?batch=1&input=' + encodeURIComponent(JSON.stringify({ 0: {} }));
            fetch(adsUrl).then(function (r) { return r.json(); }).then(function (res) {
              // Batched response: an array indexed like the input. Each element
              // is { result: { data: { json: <payload> } } } (superjson on the
              // wire). The inline script can't run superjson, but `bySurface`
              // and the `mediaUrl` strings are plain JSON, so reading `.json`
              // is safe.
              var first = Array.isArray(res) ? res[0] : res;
              var data = first && first.result && first.result.data;
              data = data && (data.json !== undefined ? data.json : data);
              var bySurface = data && data.bySurface;
              if (!bySurface) return;
              // ONLY the `hero-overlay` surface — it renders via AnimatedBanner,
              // whose <img src> is `ad.mediaUrl` VERBATIM, so the preload href
              // matches byte-for-byte (a mismatched preload is wasted bytes;
              // see docs/runbooks/mobile-image-loading.md). The `hero` surface
              // (HeroAdSlider) instead serves an optimizedImageUrl()-resized
              // webp, which we can't reproduce exactly in this transformer-less
              // inline script — so we deliberately don't preload it here.
              //
              // Phase 1.b (perf/cwv-development, 2026-06-11): we investigated
              // reproducing the hero-slider URL inline and DELIBERATELY did not.
              // The rendered <img src> = optimizedImageUrl(ad.mediaUrl, { width,
              // format:'webp', quality }) where BOTH inputs are runtime-only:
              //   • width is chosen by the slider's <picture> (640 on mobile,
              //     1920 on desktop) — viewport-dependent, the inline script
              //     can't know which <source> the browser will pick; and
              //   • quality (qMobile 45/65/80, qDesktop 50/70/85) is derived
              //     from PerformanceContext.networkMode, which is auto-detected
              //     ON MOUNT (navigator.connection / saveData / UA / CPU) and
              //     persisted per-user — unknown at HTML-parse time.
              // A preload at the wrong width/quality would be wasted bytes (the
              // exact footgun in docs/runbooks/mobile-image-loading.md), so we
              // skip it. Instead the slider's FIRST slide already renders
              // loading="eager" + fetchPriority="high" + decoding="sync" (see
              // HeroAdSlider — only idx 0 gets high priority), which is the
              // best we can do without a mismatch. A TRUE preload here needs
              // the API to return a pre-resolved/presized hero URL field (e.g.
              // ad.heroSrc640 / ad.heroSrc1920) so the inline script can emit a
              // byte-exact href — tracked as a Phase 1.b follow-up.
              var entries = bySurface['hero-overlay'];
              var mediaUrl = null;
              if (entries && entries.length) {
                for (var e = 0; e < entries.length; e++) {
                  var entry = entries[e];
                  var ad = entry && entry.ad;
                  var placement = entry && entry.placement;
                  if (ad && (ad.type === 'image' || !ad.type) && ad.mediaUrl
                      && (!placement || placement.enabled !== false)) {
                    mediaUrl = ad.mediaUrl; // AnimatedBanner renders ad.mediaUrl verbatim
                    break;
                  }
                }
              }
              if (mediaUrl) {
                var l = document.createElement('link');
                l.rel = 'preload';
                l.as = 'image';
                l.setAttribute('fetchpriority', 'high');
                l.href = mediaUrl;
                document.head.appendChild(l);
              }
            }).catch(function () {});
          } catch (ae) {}
        }
      } catch(e) {}
    })();
  </script>
