name: Auto-Deploy to PythonAnywhere

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger PythonAnywhere Webhook
        run: |
          curl -s -X POST "https://www.pythonanywhere.com/webhooks/${{ secrets.PAW_WEBHOOK_TOKEN }}/" \
            -H "User-Agent: GitHub-Actions" \
            -H "X-GitHub-Event: push" \
            --data '{}'
