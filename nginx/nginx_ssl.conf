events {}

http {
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=24h max_size=1g;
    
    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name kairomanhua.cc www.kairomanhua.cc;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name kairomanhua.cc www.kairomanhua.cc;

        ssl_certificate /etc/letsencrypt/live/kairomanhua.cc/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kairomanhua.cc/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_cache STATIC;
            proxy_cache_valid 200 1h;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        }

        location ~ ^/api/(admin|auth|save|delete|import|start|sync|user|rewards|chapter|manga) {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache off;
        }

        location /api/admin/scrape_stream {
            proxy_pass http://web:8000;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }
    }
}
