<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAIRO Icon Set</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0b0e;
    color: #e0e0e0;
    font-family: 'Cairo', sans-serif;
    padding: 40px;
  }
  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #a855f7, #00f0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    text-align: center;
    color: #62667d;
    margin-bottom: 48px;
    font-size: 0.95rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }
  .card {
    background: #12141e;
    border: 1px solid #222638;
    border-radius: 16px;
    padding: 24px 16px 16px;
    text-align: center;
    transition: 0.2s ease;
  }
  .card:hover {
    border-color: #a855f7;
    box-shadow: 0 0 20px rgba(168,85,247,0.1);
  }
  .card .icon {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }
  .card .icon svg { width: 48px; height: 48px; }
  .card .name { font-weight: 700; font-size: 0.9rem; }
  .card .file { font-size: 0.7rem; color: #62667d; margin-top: 4px; }
  .sizes {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 40px;
    padding: 24px;
    background: #12141e;
    border: 1px solid #222638;
    border-radius: 16px;
    max-width: 1000px;
    margin-left: auto;
    margin-right: auto;
  }
  .sizes .col { text-align: center; }
  .sizes .col span { display: block; font-size: 0.75rem; color: #62667d; margin-top: 6px; }
  .sizes svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
  <h1>✦ KAIRO Icon Set</h1>
  <p class="subtitle">8 minimalist SVG icons — white outlines, neon purple &amp; electric cyan accents</p>

  <div class="grid">
    <div class="card">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5" stroke="#a855f7"/><path d="M5 9v10a1 1 0 001 1h3v-5a1 1 0 011-1h4a1 1 0 011 1v5h3a1 1 0 001-1V9"/><rect x="10" y="16" width="4" height="5" rx="1" stroke="#00f0ff"/></svg></div>
      <div class="name">Home</div>
      <div class="file">home.svg</div>
    </div>
    <div class="card">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5L21 21" stroke="#a855f7"/><circle cx="10.5" cy="10.5" r="2.5" fill="#00f0ff" stroke="none" opacity="0.6"/></svg></div>
      <div class="name">Search</div>
      <div class="file">search.svg</div>
    </div>
    <div class="card">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12a1 1 0 011 1v17l-7-4.5L5 21V4a1 1 0 011-1z"/><polygon points="11,9 16,12 11,15" fill="#a855f7" stroke="none"/></svg></div>
      <div class="name">Continue Reading</div>
      <div class="file">bookmark.svg</div>
    </div>
    <div class="card">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="4" height="18" rx="1"/><rect x="10" y="5" width="4" height="15" rx="1"/><rect x="16" y="3" width="4" height="17" rx="1"/><line x1="4" y1="4" x2="8" y2="4" stroke="#a855f7" stroke-width="2.5"/><line x1="10" y1="7" x2="14" y2="7" stroke="#00f0ff" stroke-width="2.5"/><line x1="16" y1="5" x2="20" y2="5" stroke="#a855f7" stroke-width="2.5"/></svg></div>
      <div class="name">Library</div>
      <div class="file">library.svg</div>
    </div>
    <div class="card">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 9a6 6 0 00-12 0v4l-2 3h16l-2-3V9z"/><path d="M10 19a2 2 0 104 0" stroke="#00f0ff"/><circle cx="19" cy="5" r="2.5" fill="#a855f7" stroke="none"/></svg></div>
      <div class="name">New Updates</div>
      <div class="file">bell.svg</div>
    </div>
    <div class="card">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4.5"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7" stroke="#a855f7"/><circle cx="12" cy="8" r="1.5" fill="#00f0ff" stroke="none" opacity="0.7"/></svg></div>
      <div class="name">User Profile</div>
      <div class="file">profile.svg</div>
    </div>
    <div class="card">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5"/><path d="M12 1.5v3" stroke="#a855f7"/><path d="M12 19.5v3" stroke="#a855f7"/><path d="M1.5 12h3" stroke="#00f0ff"/><path d="M19.5 12h3" stroke="#00f0ff"/><path d="M4.93 4.93l2.12 2.12" stroke="#a855f7"/><path d="M16.95 16.95l2.12 2.12" stroke="#a855f7"/><path d="M4.93 19.07l2.12-2.12" stroke="#00f0ff"/><path d="M16.95 7.05l2.12-2.12" stroke="#00f0ff"/></svg></div>
      <div class="name">Settings</div>
      <div class="file">settings.svg</div>
    </div>
    <div class="card">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5L7.5 3h6.5L21 9.5V21a1 1 0 01-1 1H4a1 1 0 01-1-1V7.5z"/><circle cx="8.5" cy="8.5" r="1.5" fill="#a855f7" stroke="none"/><path d="M7 13h10" stroke="#00f0ff"/><path d="M7 16.5h7" stroke="#a855f7"/></svg></div>
      <div class="name">Category Tags</div>
      <div class="file">tag.svg</div>
    </div>
  </div>

  <div class="sizes">
    <div class="col">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="4" height="18" rx="1"/><rect x="10" y="5" width="4" height="15" rx="1"/><rect x="16" y="3" width="4" height="17" rx="1"/><line x1="4" y1="4" x2="8" y2="4" stroke="#a855f7" stroke-width="2.5"/><line x1="10" y1="7" x2="14" y2="7" stroke="#00f0ff" stroke-width="2.5"/><line x1="16" y1="5" x2="20" y2="5" stroke="#a855f7" stroke-width="2.5"/></svg>
      <span>16px</span>
    </div>
    <div class="col">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="4" height="18" rx="1"/><rect x="10" y="5" width="4" height="15" rx="1"/><rect x="16" y="3" width="4" height="17" rx="1"/><line x1="4" y1="4" x2="8" y2="4" stroke="#a855f7" stroke-width="2.5"/><line x1="10" y1="7" x2="14" y2="7" stroke="#00f0ff" stroke-width="2.5"/><line x1="16" y1="5" x2="20" y2="5" stroke="#a855f7" stroke-width="2.5"/></svg>
      <span>24px</span>
    </div>
    <div class="col">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="4" height="18" rx="1"/><rect x="10" y="5" width="4" height="15" rx="1"/><rect x="16" y="3" width="4" height="17" rx="1"/><line x1="4" y1="4" x2="8" y2="4" stroke="#a855f7" stroke-width="2.5"/><line x1="10" y1="7" x2="14" y2="7" stroke="#00f0ff" stroke-width="2.5"/><line x1="16" y1="5" x2="20" y2="5" stroke="#a855f7" stroke-width="2.5"/></svg>
      <span>32px</span>
    </div>
    <div class="col">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="4" height="18" rx="1"/><rect x="10" y="5" width="4" height="15" rx="1"/><rect x="16" y="3" width="4" height="17" rx="1"/><line x1="4" y1="4" x2="8" y2="4" stroke="#a855f7" stroke-width="2.5"/><line x1="10" y1="7" x2="14" y2="7" stroke="#00f0ff" stroke-width="2.5"/><line x1="16" y1="5" x2="20" y2="5" stroke="#a855f7" stroke-width="2.5"/></svg>
      <span>48px</span>
    </div>
    <div class="col">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="4" height="18" rx="1"/><rect x="10" y="5" width="4" height="15" rx="1"/><rect x="16" y="3" width="4" height="17" rx="1"/><line x1="4" y1="4" x2="8" y2="4" stroke="#a855f7" stroke-width="2.5"/><line x1="10" y1="7" x2="14" y2="7" stroke="#00f0ff" stroke-width="2.5"/><line x1="16" y1="5" x2="20" y2="5" stroke="#a855f7" stroke-width="2.5"/></svg>
      <span>64px</span>
    </div>
  </div>
</body>
</html>
